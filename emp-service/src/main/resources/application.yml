server:
 port: 8181
 
spring:
  application:
   name: emp-service
  datasource:
    url: jdbc:mysql://localhost:3306/springdb
    username: ${DB_PASSWORD:root}
    password: ${DB_PASSWORD:P@ssword}
    
   


  jpa:
    show-sql: true
    hibernate:
       ddl-auto: update
#debug: true

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/	
